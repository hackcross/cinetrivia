<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<meta name="theme-color" content="#060818">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="CineTrivia">
<link rel="manifest" href="manifest.json">
<link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
<link rel="apple-touch-icon" href="icon-512.png">
<title>CineTrivia</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{--bg:#060818;--p1:#0d1230;--p2:#131a44;--gold:#f4c542;--gd:#8a6e1f;--teal:#3ddfd3;--txt:#f3f4fb;--dim:#8c9ac0;--ok:#3ecf6e;--no:#ff4d5e;--safe-top:env(safe-area-inset-top,0px);--safe-bot:env(safe-area-inset-bottom,0px)}
html,body{height:100%;overscroll-behavior:none}
body{font-family:'Segoe UI',system-ui,sans-serif;background:radial-gradient(ellipse at top,#1a1f4d 0%,var(--bg) 55%);color:var(--txt);display:flex;align-items:center;justify-content:center;padding:6px;padding-top:calc(6px + var(--safe-top));padding-bottom:calc(6px + var(--safe-bot));overflow-x:hidden;-webkit-user-select:none;user-select:none}
.hide{display:none!important}
.ov{position:fixed;inset:0;background:rgba(3,4,12,.92);backdrop-filter:blur(5px);display:flex;align-items:center;justify-content:center;z-index:50;padding:10px;padding-top:calc(10px + var(--safe-top));overflow-y:auto}
.card{background:linear-gradient(180deg,#161c44,#0b0e26);border:1px solid rgba(244,197,66,.2);border-radius:14px;padding:18px 14px;text-align:center;width:100%;max-width:340px}
.card h2{font-family:'Playfair Display',serif;font-size:20px;color:var(--gold);margin-bottom:4px}
.card p{color:var(--dim);margin-bottom:6px;line-height:1.5;font-size:12px;white-space:pre-line}
.abtn{background:linear-gradient(180deg,var(--gold),#c79a1f);color:#1a1300;border:none;border-radius:999px;padding:10px 22px;font-weight:700;font-size:12px;cursor:pointer;min-height:44px;touch-action:manipulation}
.abtn:active{transform:scale(.96);opacity:.9}
.abtn.sec{background:transparent;border:1px solid rgba(244,197,66,.3);color:var(--gold)}
.abtn.sm{padding:6px 12px;font-size:10px;min-height:32px}
.btns{display:flex;gap:5px;justify-content:center;flex-wrap:wrap;margin-top:6px}
.inp{width:100%;padding:12px 14px;border-radius:10px;border:1px solid rgba(244,197,66,.25);background:#0d1230;color:var(--txt);font-size:16px;outline:none;text-align:center;margin:6px 0}
.inp:focus{border-color:var(--gold)}
.lang-grid{display:grid;grid-template-columns:1fr 1fr;gap:5px;margin:8px 0}
.lang-btn{background:linear-gradient(180deg,#1a2152,#10153a);border:1px solid rgba(244,197,66,.12);border-radius:8px;padding:12px 6px;cursor:pointer;text-align:center;font-size:13px;color:var(--txt);display:flex;align-items:center;justify-content:center;gap:5px;min-height:44px}
.lang-btn:active{border-color:var(--gold);background:#232c66}
.modes{display:flex;flex-direction:column;gap:7px;margin:6px 0}
.mode-card{background:linear-gradient(180deg,#1a2152,#10153a);border:1px solid rgba(244,197,66,.12);border-radius:10px;padding:12px;cursor:pointer;text-align:left}
.mode-card:active{border-color:var(--gold);transform:scale(.98)}
.mode-card h3{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold);margin-bottom:2px}
.mode-card p{font-size:11px;color:var(--dim);line-height:1.3;margin:0}
.mode-card .rec{font-size:9px;color:var(--teal);margin-top:3px}
.user-tag{font-size:11px;color:var(--teal);margin-bottom:6px}
.lb-tabs{display:flex;gap:4px;justify-content:center;margin:6px 0}
.lb-tab{padding:5px 14px;border-radius:99px;border:1px solid var(--p2);background:transparent;color:var(--dim);cursor:pointer;font-size:11px;min-height:32px}
.lb-tab.on{background:var(--gold);color:#1a1300;border-color:var(--gold);font-weight:700}
.lb-list{max-height:220px;overflow-y:auto}
.lb-row{display:flex;align-items:center;gap:6px;padding:6px 8px;border-radius:6px;font-size:12px;margin-bottom:2px;background:rgba(255,255,255,.02)}
.lb-row.me{background:rgba(244,197,66,.08);border:1px solid rgba(244,197,66,.15)}
.lb-row .rank{width:22px;font-weight:700;color:var(--gold);text-align:center}
.lb-row .nm{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.lb-row .sc{color:var(--teal);font-weight:600;white-space:nowrap}
.lb-empty{color:var(--dim);font-size:11px;padding:12px}
.my-rank{font-size:10px;color:var(--teal);margin-top:4px}

.stage{width:100%;max-width:420px;display:flex;flex-direction:column;gap:5px}
.topbar{display:flex;justify-content:space-between;align-items:center;padding:0 2px}
.topbar h1{font-family:'Playfair Display',serif;font-size:18px;background:linear-gradient(180deg,#fff7d6,var(--gold) 60%,var(--gd));-webkit-background-clip:text;background-clip:text;color:transparent}
.home-btn{width:34px;height:34px;border-radius:50%;border:1px solid rgba(244,197,66,.2);background:rgba(13,18,48,.8);color:var(--dim);font-size:14px;cursor:pointer;display:flex;align-items:center;justify-content:center}
.home-btn:active{border-color:var(--gold);color:var(--gold)}

.srow{display:flex;justify-content:center;gap:2px}
.sw{width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.sw svg{width:24px;height:24px;transition:all .3s;filter:drop-shadow(0 1px 2px rgba(0,0,0,.25))}
.sw.empty svg .sb{fill:#151a3a;stroke:#2a3060;stroke-width:2.5}.sw.empty svg .sc{fill:#0d1230;stroke:#2a3060;stroke-width:2}
.sw.cur svg .sb{fill:#2a2400;stroke:var(--gold);stroke-width:3}.sw.cur svg .sc{fill:#1a1800;stroke:var(--gold);stroke-width:2}
.sw.cur svg{filter:drop-shadow(0 0 6px rgba(244,197,66,.5));transform:scale(1.2);animation:glow 2s ease-in-out infinite}
.sw.done svg .sb{fill:var(--gold);stroke:#d4a520;stroke-width:2}.sw.done svg .sc{fill:#e8b830;stroke:#c8981a;stroke-width:1.5}
@keyframes glow{0%,100%{filter:drop-shadow(0 0 6px rgba(244,197,66,.35))}50%{filter:drop-shadow(0 0 12px rgba(244,197,66,.65))}}

.pnl{background:linear-gradient(180deg,var(--p2),var(--p1));border:1px solid rgba(244,197,66,.12);border-radius:12px;padding:8px;box-shadow:0 8px 28px rgba(0,0,0,.4);display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden}
.meta{display:flex;justify-content:space-between;align-items:center;font-size:10px;color:var(--dim);padding:0 2px}
.tag{padding:2px 7px;border-radius:99px;border:1px solid var(--gd);color:var(--gold);font-weight:700;font-size:9px;text-transform:uppercase}
.lbadge{color:var(--teal);font-weight:700;font-size:10px}

.scene{width:100%;aspect-ratio:16/9;border-radius:8px;overflow:hidden;background:#030610;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.scene img{width:100%;height:100%;object-fit:cover;display:block}

.opts{display:grid;grid-template-columns:1fr 1fr;gap:5px}
.opt{background:linear-gradient(180deg,#1a2152,#10153a);border:1px solid rgba(244,197,66,.15);border-radius:8px;color:var(--txt);padding:10px 8px;text-align:left;font-size:12.5px;cursor:pointer;transition:all .1s;display:flex;gap:5px;align-items:center;line-height:1.2;user-select:none;min-height:44px}
.opt .k{color:var(--gold);font-weight:700;font-family:'Playfair Display',serif}
.opt:active:not(.locked){background:#232c66;border-color:var(--gold)}
.opt.ok{border-color:var(--ok);background:linear-gradient(180deg,#16462a,#0c2c1b);pointer-events:none}
.opt.no{border-color:var(--no);background:linear-gradient(180deg,#4a1620,#2a0d13)}
.opt.used{opacity:.2;pointer-events:none}.opt.locked{pointer-events:none}

.mstage{width:100%;max-width:420px;display:flex;flex-direction:column;gap:4px}
.mtop{display:flex;justify-content:space-between;align-items:center;padding:0 2px;gap:6px}
.mtop h2{font-family:'Playfair Display',serif;font-size:14px;color:var(--gold)}
.mtimer{font-family:'Playfair Display',serif;font-size:13px;color:var(--teal)}
.mprog{font-size:10px;color:var(--dim)}
.mgrid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;padding:2px 0;max-height:38vh;overflow-y:auto;-webkit-overflow-scrolling:touch}
.mg{background:linear-gradient(180deg,#1a2152,#10153a);border:1px solid rgba(244,197,66,.12);border-radius:6px;color:var(--txt);padding:8px 4px;text-align:center;font-size:10px;line-height:1.2;cursor:pointer;transition:all .1s;user-select:none;min-height:38px;display:flex;align-items:center;justify-content:center;word-break:break-word}
.mg:active:not(.ok):not(.no){background:#232c66;border-color:var(--gold)}
.mg.ok{background:linear-gradient(180deg,#16462a,#0c2c1b);border-color:var(--ok);color:var(--ok);opacity:.5;pointer-events:none}
.mg.no{border-color:var(--no);background:linear-gradient(180deg,#4a1620,#2a0d13)}

.estars{display:flex;flex-wrap:wrap;justify-content:center;gap:3px;margin:6px auto 8px;max-width:200px}
.es{width:26px;height:26px}.es svg{width:100%;height:100%}
.es.f svg .sb{fill:var(--gold);stroke:#d4a520;stroke-width:2}.es.f svg .sc{fill:#e8b830;stroke:#c8981a;stroke-width:1.5}
.es.e svg .sb{fill:#151a3a;stroke:#2a3060;stroke-width:2.5}.es.e svg .sc{fill:#0d1230;stroke:#2a3060;stroke-width:2}
.stat-row{display:flex;justify-content:center;gap:12px;margin:4px 0;font-size:11px}.stat-row span{color:var(--dim)}.stat-row b{color:var(--txt)}

/* Splash */
#splash{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;z-index:999;transition:opacity .4s}
#splash.gone{opacity:0;pointer-events:none}
#splash h1{font-family:'Playfair Display',serif;font-size:32px;color:var(--gold);margin-top:12px}
#splash p{color:var(--dim);font-size:11px;margin-top:4px}
</style>
</head>

/* Leaderboard - localStorage based for standalone app */
const LB_KEY='ct_lb';let lbData={classic:[],match:[]};
function lbLoad(){try{const d=localStorage.getItem(LB_KEY);if(d)lbData=JSON.parse(d)}catch(e){}if(!lbData||!lbData.classic)lbData={classic:[],match:[]}}
function lbSave(){try{localStorage.setItem(LB_KEY,JSON.stringify(lbData))}catch(e){}}
function lbUpdC(name,stars){lbLoad();const i=lbData.classic.findIndex(e=>e.name===name);if(i>=0){if(stars>lbData.classic[i].stars)lbData.classic[i].stars=stars}else lbData.classic.push({name,stars});lbData.classic.sort((a,b)=>b.stars-a.stars);lbData.classic=lbData.classic.slice(0,50);lbSave()}
function lbUpdM(name,time,errors){lbLoad();const i=lbData.match.findIndex(e=>e.name===name);if(i>=0){const o=lbData.match[i];if(time<o.time||(time===o.time&&errors<o.errors)){o.time=time;o.errors=errors}}else lbData.match.push({name,time,errors});lbData.match.sort((a,b)=>a.time-b.time||a.errors-b.errors);lbData.match=lbData.match.slice(0,50);lbSave()}
function getRank(mode){const list=mode==='classic'?lbData.classic:lbData.match;return list.findIndex(e=>e.name===username)+1}
function renderLB(mode){const list=mode==='classic'?lbData?.classic||[]:lbData?.match||[];const el=document.getElementById('lbList');if(!list.length){el.innerHTML=`<div class="lb-empty">${t('noScores')}</div>`;document.getElementById('myRank').textContent='';return}el.innerHTML=list.slice(0,10).map((e,i)=>{const isMe=e.name===username;const sc=mode==='classic'?`${e.stars} ⭐`:`${fmt(e.time)} · ${e.errors}❌`;return`<div class="lb-row${isMe?' me':''}"><span class="rank">${i+1}</span><span class="nm">${e.name}</span><span class="sc">${sc}</span></div>`}).join('');const rk=getRank(mode);document.getElementById('myRank').textContent=rk>0?t('yourRank').replace('{n}',rk):''}

function sh(a){const b=[...a];for(let i=b.length-1;i>0;i--){const j=0|Math.random()*(i+1);[b[i],b[j]]=[b[j],b[i]]}return b}
function pImg(m){if(!m||!m.b||!m.b.length)return null;return IB+m.b[0|Math.random()*m.b.length]}
function loadImg(sc,url){if(!url){sc.innerHTML='<span style="color:var(--dim)">📷</span>';return}sc.innerHTML='';const im=new Image();im.onload=()=>{sc.innerHTML='';sc.appendChild(im)};im.onerror=()=>{sc.innerHTML='<span style="color:var(--dim)">📷</span>'};im.src=url;im.style="width:100%;height:100%;object-fit:cover;display:block"}

/* CLASSIC */
let cQ=[],cCur=0,cLives=0,cAns=false,cUsed=[];
function cPW(mv,cat){const s=POOL[cat].filter(m=>m.id!==mv.id);const g=s.filter(m=>m.g.some(x=>mv.g.includes(x)));return sh(g.length>=3?g:s).slice(0,3)}
function cGen(){cQ=[];const ui=new Set();
for(let i=0;i<12;i++){const cat=CTS[i];if(!POOL[cat]?.length)continue;const av=POOL[cat].filter(m=>!ui.has(m.id)&&pImg(m));if(!av.length)continue;
const mv=av[0|Math.random()*av.length];ui.add(mv.id);const wr=cPW(mv,cat);wr.forEach(w=>ui.add(w.id));
const op=[{t:mv.t,c:true},...wr.map(w=>({t:w.t,c:false}))];const s=sh(op);
cQ.push({mv,img:pImg(mv),op:s,ci:s.findIndex(o=>o.c)})}cCur=0;cLives=0;cAns=false;cUsed=[]}
function cBS(){const c=document.getElementById('srow');c.innerHTML='';for(let i=0;i<12;i++){const w=document.createElement('div');w.className='sw empty';w.dataset.i=i;w.innerHTML=SS;c.appendChild(w)}}
function cUS(){document.querySelectorAll('#srow .sw').forEach(w=>{const i=+w.dataset.i;w.className='sw '+(i<cCur?'done':i===cCur?'cur':'empty')})}
function cUL(){document.getElementById('lb').innerHTML=cLives>0?`🛡️ ${cLives} ${t('lives')}`:`<span style="opacity:.3">🛡️ 0</span>`}
function cRender(){if(cCur>=cQ.length){cEnd(true);return}cAns=false;cUsed=[];if(CH.includes(cCur))cLives++;cUL();cUS();
const d=cQ[cCur];document.getElementById('lvl').textContent=LV[cCur];
loadImg(document.getElementById('cSc'),d.img);
const el=document.getElementById('opts');el.innerHTML='';['A','B','C','D'].forEach((l,i)=>{if(!d.op[i])return;const b=document.createElement('button');b.className='opt';b.innerHTML=`<span class="k">${l}</span><span>${d.op[i].t}</span>`;b.addEventListener('click',()=>cPick(i));b.dataset.i=i;el.appendChild(b)})}
function cPick(i){if(cAns||cUsed.includes(i))return;const d=cQ[cCur],b=document.querySelector(`.opt[data-i="${i}"]`);
if(i===d.ci){cAns=true;b.classList.add('ok');document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));setTimeout(()=>{cCur++;cCur>=cQ.length?cEnd(true):cRender()},750)}
else{b.classList.add('no');cUsed.push(i);if(cLives>0){cLives--;cUL();setTimeout(()=>{b.classList.remove('no');b.classList.add('used')},450)}
else{cAns=true;document.querySelectorAll('.opt').forEach(o=>o.classList.add('locked'));setTimeout(()=>document.querySelector(`.opt[data-i="${d.ci}"]`)?.classList.add('ok'),350);setTimeout(()=>cEnd(false),1400)}}}
function cEnd(won){lbUpdC(username,cCur);const el=document.getElementById('ceS');el.innerHTML='';for(let i=0;i<12;i++){const d=document.createElement('div');d.className='es '+(i<cCur?'f':'e');d.innerHTML=SS;el.appendChild(d)}
document.getElementById('ceT').textContent=won?t('masterEnd'):t('overEnd');document.getElementById('ceTx').textContent=won?t('allStars'):`${t('answer')}: ${cQ[cCur]?.mv?.t||'?'}\n${cCur}/12 ${t('stars')}`;
const rk=getRank('classic');document.getElementById('ceRk').textContent=rk>0?t('yourRank').replace('{n}',rk):'';
document.getElementById('ceRe').textContent=t('replay');document.getElementById('ceMe').textContent=t('menu');showOnly('cEndOv')}
function startClassic(){showOnly('classicUI');cGen();cBS();cRender()}
document.getElementById('ceRe').addEventListener('click',startClassic);document.getElementById('ceMe').addEventListener('click',showMenu);document.getElementById('cHome').addEventListener('click',showMenu);

let mMv=[],mOrd=[],mIdx=0,mOk=new Set(),mErr=0,mTv=0,mTid=null;
function mGen(){const all=[];['easy','medium','hard','vhard'].forEach(c=>{if(POOL[c])POOL[c].filter(m=>pImg(m)).forEach(m=>all.push(m))});mMv=sh(all).slice(0,Math.min(15,all.length));const n=mMv.length;mOrd=sh([...Array(n).keys()]);mIdx=0;mOk=new Set();mErr=0;mTv=0}
function mST(){if(mTid)clearInterval(mTid);mTv=0;mTid=setInterval(()=>{mTv++;document.getElementById('mTi').textContent=fmt(mTv)},1000)}
function mRender(){const g=document.getElementById('mGr');g.innerHTML='';const n=mMv.length;sh([...Array(n).keys()]).forEach(mi=>{const b=document.createElement('button');b.className='mg';if(mOk.has(mi))b.classList.add('ok');b.textContent=mMv[mi]?.t||'?';b.dataset.mi=mi;b.addEventListener('click',()=>mPick(mi,b));g.appendChild(b)});mShow()}
function mShow(){const n=mMv.length;if(mIdx>=n)return;document.getElementById('mPr').textContent=`${mOk.size}/${n}`;if(!mMv[mOrd[mIdx]]){mIdx++;if(mIdx<n)mShow();return}loadImg(document.getElementById('mSc'),pImg(mMv[mOrd[mIdx]]))}
function mPick(mi,btn){if(mOk.has(mi))return;const n=mMv.length;if(mi===mOrd[mIdx]){mOk.add(mi);btn.classList.add('ok');mIdx++;while(mIdx<n&&mOk.has(mOrd[mIdx]))mIdx++;if(mOk.size>=n)setTimeout(mEnd,500);else setTimeout(mShow,350)}else{mErr++;btn.classList.add('no');setTimeout(()=>btn.classList.remove('no'),350)}}
function mEnd(){if(mTid){clearInterval(mTid);mTid=null}lbUpdM(username,mTv,mErr);
document.getElementById('meT').textContent=t('matchDone');document.getElementById('meTx').textContent=`${mMv.length} ${t('matched')}`;
document.getElementById('meSt').innerHTML=`<span>⏱ <b>${fmt(mTv)}</b></span><span>❌ <b>${mErr}</b> ${t('errors')}</span>`;
const rk=getRank('match');document.getElementById('meRk').textContent=rk>0?t('yourRank').replace('{n}',rk):'';
document.getElementById('meRe').textContent=t('replay');document.getElementById('meMe').textContent=t('menu');showOnly('mEndOv')}
function startMatch(){showOnly('matchUI');mGen();mRender();mST()}
document.getElementById('meRe').addEventListener('click',startMatch);document.getElementById('meMe').addEventListener('click',()=>{if(mTid){clearInterval(mTid);mTid=null}showMenu()});document.getElementById('mHome').addEventListener('click',()=>{if(mTid){clearInterval(mTid);mTid=null}showMenu()});

/* INIT */
buildLangUI();const sL=localStorage.getItem('ct_lang');if(sL&&T[sL]){lang=sL;showNameScreen()}
</script>
</body>
